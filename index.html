<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AI Переводчик (Gemini)</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; background: #f9f9f9; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; background: white; border-left: 5px solid #007bff; min-height: 50px; }
    </style>
</head>
<body>
    <h2>AI Переводчик</h2>
    <textarea id="input" placeholder="Введите текст для перевода..."></textarea>
    <button onclick="translateText()">Перевести</button>
    <div id="result">Результат появится здесь...</div>

    <script>
        // Ссылка на ваш воркер в Cloudflare
        const WORKER_URL = "https://translatecloud-proxy.ruslanpetrov7474.workers.dev";

        async function translateText( ) {
            const text = document.getElementById('input').value;
            const resDiv = document.getElementById('result');
            if(!text) return alert("Введите текст");
            
            resDiv.innerText = "Перевожу...";
            
            try {
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const data = await response.json();
                resDiv.innerText = data.translatedText || "Ошибка";
            } catch (e) {
                resDiv.innerText = "Ошибка соединения с Worker";
            }
        }
    </script>
</body>
</html>
