<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TranslateCloud — AI-переводчик</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.09);
    --border-soft: rgba(255,255,255,0.07);
    --accent1: #6366f1;
    --accent2: #8b5cf6;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --text-faint: #334155;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 60%, #0f172a 100%);
    min-height: 100vh;
    padding: 20px 12px;
    color: var(--text);
  }
  .wrap { max-width: 820px; margin: 0 auto; }

  /* Header */
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .logo {
    width: 44px; height: 44px; border-radius: 13px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    display: flex; align-items: center; justify-content: center; font-size: 22px;
  }
  .title { margin: 0; font-size: 20px; font-weight: 800; letter-spacing: -0.5px; color: #f1f5f9; }
  .subtitle { margin: 0; font-size: 12px; color: #64748b; }
  .tabs { margin-left: auto; display: flex; gap: 6px; }
  .tab-btn {
    padding: 7px 14px; border-radius: 9px; border: none; cursor: pointer;
    font-size: 12.5px; font-weight: 700; background: rgba(255,255,255,0.07); color: #64748b;
  }
  .tab-btn.active { background: linear-gradient(135deg, var(--accent1), var(--accent2)); color: #fff; }

  /* Panel */
  .panel { background: var(--panel); border-radius: 20px; border: 1px solid var(--border); }
  .lang-row {
    display: flex; align-items: center; gap: 10px; padding: 14px 16px;
    border-bottom: 1px solid var(--border-soft); flex-wrap: wrap;
  }
  select {
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); color: var(--text);
    padding: 8px 10px; border-radius: 10px; font-size: 13.5px; cursor: pointer; outline: none; max-width: 42%;
  }
  select option { background: #1e293b; }
  .icon-btn {
    border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
    background: transparent; transition: all .15s; color: var(--text-dim);
  }
  .translate-btn {
    margin-left: auto; padding: 9px 22px; border-radius: 11px; border: none; cursor: pointer;
    background: linear-gradient(135deg, var(--accent1), var(--accent2)); color: #fff; font-weight: 800; font-size: 14px;
  }
  .translate-btn:disabled { opacity: 0.45; cursor: default; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; min-height: 220px; }
  @media (max-width: 680px) {
    .grid { grid-template-columns: 1fr; }
    .col-input { border-right: none !important; border-bottom: 1px solid var(--border-soft); }
    select { max-width: 100%; }
    .lang-row { justify-content: center; }
    .translate-btn { margin-left: 0; width: 100%; }
  }

  .col { padding: 14px 14px; display: flex; flex-direction: column; }
  .col-input { border-right: 1px solid var(--border-soft); position: relative; }

  textarea {
    background: transparent; border: none; color: var(--text); font-size: 15px; line-height: 1.7;
    resize: none; outline: none; width: 100%; font-family: inherit; min-height: 140px; flex: 1;
  }
  .input-toolbar { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; flex-wrap: wrap; gap: 6px; }
  .left-tools { display: flex; gap: 8px; align-items: center; }
  .round-btn {
    width: 38px; height: 38px; border-radius: 50%; font-size: 17px;
    background: rgba(99,102,241,0.15); border: 1.5px solid rgba(99,102,241,0.4); color: #818cf8;
  }
  .round-btn.recording { background: rgba(239,68,68,0.25); border-color: #ef4444; color: #ef4444; animation: pulse 1s ease-in-out infinite; }
  .round-btn:disabled { opacity: 0.35; }
  .clear-text-btn { padding: 5px 12px; border-radius: 8px; background: rgba(239,68,68,0.08); color: #f87171; font-size: 13px; }
  .char-count { color: var(--text-faint); font-size: 11.5px; margin-left: auto; }

  .img-preview-row { margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
  .img-thumb-wrap { position: relative; display: inline-block; }
  .img-thumb { max-height: 100px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.12); display: block; }
  .img-remove-btn {
    position: absolute; top: -8px; right: -8px; width: 22px; height: 22px; border-radius: 50%;
    background: #ef4444; color: #fff; font-size: 12px;
  }
  .img-translate-btn {
    padding: 7px 16px; border-radius: 9px; border: none; cursor: pointer;
    background: linear-gradient(135deg, var(--accent1), var(--accent2)); color: #fff; font-weight: 700; font-size: 13px;
  }
  .img-translate-btn:disabled { opacity: 0.6; }

  .output-area { flex: 1; overflow-y: auto; }
  .recognized-line { color: var(--text-dim); font-size: 12.5px; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--border-soft); }
  .recognized-line strong { color: #94a3b8; }
  .output-text { color: var(--text-faint); font-size: 15px; line-height: 1.75; white-space: pre-wrap; }
  .output-text.filled { color: var(--text); }

  .center-box { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 10px; }
  .spinner { width: 36px; height: 36px; border-radius: 50%; border: 3px solid var(--accent1); border-top-color: transparent; animation: spin 0.8s linear infinite; }
  .error-box { color: #f87171; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 10px; padding: 12px 16px; font-size: 13px; }

  .output-actions { display: flex; gap: 7px; margin-top: 8px; justify-content: flex-end; flex-wrap: wrap; }
  .action-pill { padding: 5px 13px; border-radius: 8px; background: rgba(255,255,255,0.06); color: var(--text-dim); font-size: 13px; }
  .action-pill.copied { color: #4ade80; }
  .action-pill.danger { background: rgba(239,68,68,0.08); color: #f87171; }

  .hint-bar {
    padding: 10px 16px; border-top: 1px solid rgba(255,255,255,0.06); color: var(--text-faint);
    font-size: 11.5px; display: flex; gap: 14px; flex-wrap: wrap;
  }

  /* History */
  .history-panel { padding: 18px; }
  .history-title { color: #f1f5f9; margin: 0 0 14px; font-size: 16px; font-weight: 700; }
  .history-empty { color: var(--text-faint); text-align: center; padding: 40px 0; font-size: 14px; }
  .history-item {
    padding: 12px 14px; border-radius: 12px; background: rgba(255,255,255,0.04);
    border: 1px solid var(--border-soft); margin-bottom: 9px; cursor: pointer;
  }
  .history-item:hover { border-color: rgba(99,102,241,0.4); }
  .history-meta { display: flex; justify-content: space-between; margin-bottom: 5px; flex-wrap: wrap; gap: 4px; }
  .history-langs { color: #818cf8; font-size: 11.5px; font-weight: 700; }
  .history-time { color: var(--text-faint); font-size: 11px; }
  .history-input { color: #64748b; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .history-output { color: #cbd5e1; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 2px; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <div class="logo">🌍</div>
    <div>
      <h1 class="title">TranslateCloud</h1>
      <p class="subtitle">AI-переводчик • голос • фото • история</p>
    </div>
    <div class="tabs">
      <button class="tab-btn active" data-tab="translate">Перевод</button>
      <button class="tab-btn" data-tab="history">История (<span id="historyCount">0</span>)</button>
    </div>
  </div>

  <!-- TRANSLATE TAB -->
  <div id="translateTab" class="panel">
    <div class="lang-row">
      <select id="srcLang" aria-label="Исходный язык"></select>
      <button id="swapBtn" class="icon-btn" title="Поменять языки" aria-label="Поменять языки местами">⇄</button>
      <select id="tgtLang" aria-label="Язык перевода"></select>
      <button id="translateBtn" class="translate-btn">Перевести →</button>
    </div>

    <div class="grid">
      <div class="col col-input">
        <div id="imgPreviewRow" class="img-preview-row hidden">
          <div class="img-thumb-wrap">
            <img id="imgThumb" class="img-thumb" alt="Загруженное фото для перевода">
            <button id="imgRemoveBtn" class="icon-btn img-remove-btn" title="Удалить фото" aria-label="Удалить фото">✕</button>
          </div>
          <button id="imgTranslateBtn" class="img-translate-btn">Перевести фото →</button>
        </div>

        <textarea id="inputText" placeholder="Введите текст, нажмите 🎤 или загрузите фото 📷…" maxlength="2000" aria-label="Текст для перевода"></textarea>

        <div class="input-toolbar">
          <div class="left-tools">
            <button id="micBtn" class="icon-btn round-btn" title="Говорить" aria-label="Голосовой ввод">🎤</button>
            <input id="fileInput" type="file" accept="image/*" class="hidden">
            <button id="photoBtn" class="icon-btn round-btn" title="Перевести фото" aria-label="Загрузить фото для перевода">📷</button>
            <span id="recordingLabel" class="hidden" style="color:#ef4444;font-size:12px;font-weight:600;">● Запись…</span>
          </div>
          <button id="clearInputBtn" class="icon-btn clear-text-btn hidden">✕ Очистить</button>
          <span class="char-count"><span id="charCount">0</span>/2000</span>
        </div>
      </div>

      <div class="col">
        <div id="outputCenter" class="hidden"></div>
        <div id="outputArea" class="output-area">
          <div id="recognizedLine" class="recognized-line hidden"><strong>Распознано на фото:</strong> <span id="recognizedText"></span></div>
          <div id="outputText" class="output-text">Перевод появится здесь…</div>
        </div>
        <div id="outputActions" class="output-actions hidden">
          <button id="speakBtn" class="icon-btn action-pill">🔊 Слушать</button>
          <button id="copyBtn" class="icon-btn action-pill">📋 Копировать</button>
          <button id="clearOutputBtn" class="icon-btn action-pill danger">✕ Очистить</button>
        </div>
      </div>
    </div>

    <div class="hint-bar">
      <span>⌨️ Ctrl+Enter — перевести</span>
      <span>🎤 Голосовой ввод</span>
      <span>📷 Перевод текста с фото</span>
      <span>🔊 Прослушать перевод</span>
    </div>
  </div>

  <!-- HISTORY TAB -->
  <div id="historyTab" class="panel history-panel hidden">
    <h2 class="history-title">История переводов</h2>
    <div id="historyList"></div>
  </div>
</div>

<script>
/* ============== НАСТРОЙКА ============== */
// Вставьте сюда ваш ключ с aistudio.google.com/app/apikey
const GEMINI_API_KEY = "AQ.Ab8RN6IVoBEl0eW7BuzUdfXDeukNN3KGrixkS1q6VvMaOo4ejA";
const GEMINI_MODEL = "gemini-2.5-flash";
const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`;


const LANGUAGES = [
  { code: "auto", name: "Авто-определение", flag: "🌐" },
  { code: "ru", name: "Русский", flag: "🇷🇺" },
  { code: "en", name: "Английский", flag: "🇬🇧" },
  { code: "no", name: "Норвежский", flag: "🇳🇴" },
  { code: "de", name: "Немецкий", flag: "🇩🇪" },
  { code: "fr", name: "Французский", flag: "🇫🇷" },
  { code: "es", name: "Испанский", flag: "🇪🇸" },
  { code: "it", name: "Итальянский", flag: "🇮🇹" },
  { code: "pl", name: "Польский", flag: "🇵🇱" },
  { code: "uk", name: "Украинский", flag: "🇺🇦" },
  { code: "ar", name: "Арабский", flag: "🇸🇦" },
  { code: "zh", name: "Китайский", flag: "🇨🇳" },
  { code: "ja", name: "Японский", flag: "🇯🇵" },
  { code: "ko", name: "Корейский", flag: "🇰🇷" },
  { code: "pt", name: "Португальский", flag: "🇵🇹" },
  { code: "tr", name: "Турецкий", flag: "🇹🇷" },
  { code: "sv", name: "Шведский", flag: "🇸🇪" },
  { code: "da", name: "Датский", flag: "🇩🇰" },
  { code: "fi", name: "Финский", flag: "🇫🇮" },
  { code: "nl", name: "Нидерландский", flag: "🇳🇱" },
];
const TARGET_LANGS = LANGUAGES.filter(l => l.code !== "auto");
const LANG_LOCALE = {
  ru:"ru-RU", en:"en-US", no:"nb-NO", de:"de-DE", fr:"fr-FR",
  es:"es-ES", it:"it-IT", pl:"pl-PL", uk:"uk-UA", ar:"ar-SA",
  zh:"zh-CN", ja:"ja-JP", ko:"ko-KR", pt:"pt-PT", tr:"tr-TR",
  sv:"sv-SE", da:"da-DK", fi:"fi-FI", nl:"nl-NL",
};
const HISTORY_KEY = "translatecloud_history";

/* ============== СОСТОЯНИЕ ============== */
let history = [];
let recording = false;
let recognition = null;
let abortController = null;
let imageBase64 = null;
let imageMediaType = null;

/* ============== DOM ============== */
const $ = id => document.getElementById(id);
const srcSelect = $("srcLang"), tgtSelect = $("tgtLang");
const inputText = $("inputText"), outputText = $("outputText");
const outputArea = $("outputArea"), outputCenter = $("outputCenter"), outputActions = $("outputActions");
const recognizedLine = $("recognizedLine"), recognizedTextEl = $("recognizedText");
const micBtn = $("micBtn"), photoBtn = $("photoBtn"), fileInput = $("fileInput");
const recordingLabel = $("recordingLabel"), clearInputBtn = $("clearInputBtn"), charCount = $("charCount");
const imgPreviewRow = $("imgPreviewRow"), imgThumb = $("imgThumb"), imgRemoveBtn = $("imgRemoveBtn"), imgTranslateBtn = $("imgTranslateBtn");

/* ============== ИНИЦИАЛИЗАЦИЯ ============== */
function getLangName(code) { return LANGUAGES.find(l => l.code === code)?.name ?? code; }

function fillSelects() {
  srcSelect.innerHTML = LANGUAGES.map(l => `<option value="${l.code}">${l.flag} ${l.name}</option>`).join("");
  tgtSelect.innerHTML = TARGET_LANGS.map(l => `<option value="${l.code}">${l.flag} ${l.name}</option>`).join("");
  srcSelect.value = "ru";
  tgtSelect.value = "en";
}

function loadHistory() {
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    history = raw ? JSON.parse(raw) : [];
  } catch (e) {
    history = [];
  }
  renderHistory();
}

function saveHistory() {
  try {
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  } catch (e) {
    console.error("Не удалось сохранить историю:", e);
  }
}

function addHistoryItem(item) {
  history = [item, ...history].slice(0, 30);
  saveHistory();
  renderHistory();
}

function renderHistory() {
  $("historyCount").textContent = history.length;
  const list = $("historyList");
  if (history.length === 0) {
    list.innerHTML = `<p class="history-empty">Пока ничего нет. Переведите что-нибудь!</p>`;
    return;
  }
  list.innerHTML = history.map((item, i) => `
    <div class="history-item" data-idx="${i}">
      <div class="history-meta">
        <span class="history-langs">${LANGUAGES.find(l=>l.code===item.src)?.flag||""} ${getLangName(item.src)} → ${LANGUAGES.find(l=>l.code===item.tgt)?.flag||""} ${getLangName(item.tgt)}</span>
        <span class="history-time">${item.time}</span>
      </div>
      <div class="history-input">${escapeHtml(item.input)}</div>
      <div class="history-output">→ ${escapeHtml(item.output)}</div>
    </div>
  `).join("");
  list.querySelectorAll(".history-item").forEach(el => {
    el.addEventListener("click", () => {
      const item = history[Number(el.dataset.idx)];
      inputText.value = item.input;
      charCount.textContent = item.input.length;
      setOutput(item.output);
      srcSelect.value = item.src;
      tgtSelect.value = item.tgt;
      switchTab("translate");
    });
  });
}

function escapeHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

/* ============== ВКЛАДКИ ============== */
function switchTab(tab) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
  $("translateTab").classList.toggle("hidden", tab !== "translate");
  $("historyTab").classList.toggle("hidden", tab !== "history");
}
document.querySelectorAll(".tab-btn").forEach(b => b.addEventListener("click", () => switchTab(b.dataset.tab)));

/* ============== ВЫВОД / СОСТОЯНИЕ UI ============== */
function setLoading(isLoading) {
  if (isLoading) {
    outputCenter.classList.remove("hidden");
    outputCenter.innerHTML = `<div class="center-box"><div class="spinner"></div><span style="color:#6366f1;font-size:13px;">Переводим…</span></div>`;
    outputArea.classList.add("hidden");
    outputActions.classList.add("hidden");
  } else {
    outputCenter.classList.add("hidden");
    outputArea.classList.remove("hidden");
  }
}

function setError(msg) {
  outputArea.classList.add("hidden");
  outputCenter.classList.remove("hidden");
  outputCenter.innerHTML = `<div class="center-box"><div role="alert" class="error-box">${escapeHtml(msg)}</div></div>`;
  outputActions.classList.add("hidden");
}

function setOutput(text, recognized) {
  outputCenter.classList.add("hidden");
  outputArea.classList.remove("hidden");
  if (recognized) {
    recognizedTextEl.textContent = recognized;
    recognizedLine.classList.remove("hidden");
  } else {
    recognizedLine.classList.add("hidden");
  }
  outputText.textContent = text || "Перевод появится здесь…";
  outputText.classList.toggle("filled", !!text);
  outputActions.classList.toggle("hidden", !text);
}

/* ============== ПЕРЕВОД ТЕКСТА ============== */
async function doTranslate(text, srcLang, tgtLang) {
  if (!text.trim()) return;
  if (abortController) abortController.abort();
  abortController = new AbortController();
  const controller = abortController;

  setLoading(true);
  const srcName = srcLang === "auto" ? "any language (auto-detect)" : getLangName(srcLang);
  const tgtName = getLangName(tgtLang);

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      signal: controller.signal,
      body: JSON.stringify({
        contents: [{ parts: [{ text: text }] }],
        systemInstruction: { parts: [{ text: `You are a translation engine. Translate the user's text from ${srcName} to ${tgtName}. Output ONLY the translated text. No explanations, no quotes, no extra words.` }] },
        generationConfig: { maxOutputTokens: 1000 },
      }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message ?? `HTTP ${res.status}`);
    }
    const data = await res.json();
    const translated = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() ?? "";
    if (!translated) throw new Error("Пустой ответ от API");
    setOutput(translated);
    addHistoryItem({ input: text, output: translated, src: srcLang, tgt: tgtLang, time: new Date().toLocaleTimeString("ru") });
  } catch (e) {
    if (e.name === "AbortError") return;
    setError("Ошибка: " + e.message);
  } finally {
    if (abortController === controller) setLoading(false);
  }
}

/* ============== ПЕРЕВОД ФОТО ============== */
function resizeAndEncodeImage(file, maxDim = 1500) {
  return new Promise((resolve, reject) => {
    if (!file.type.startsWith("image/")) { reject(new Error("Файл не является изображением")); return; }
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          const scale = maxDim / Math.max(width, height);
          width = Math.round(width * scale);
          height = Math.round(height * scale);
        }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
        resolve({ base64: dataUrl.split(",")[1], mediaType: "image/jpeg", dataUrl });
      };
      img.onerror = () => reject(new Error("Не удалось загрузить изображение"));
      img.src = reader.result;
    };
    reader.onerror = () => reject(new Error("Ошибка чтения файла"));
    reader.readAsDataURL(file);
  });
}

fileInput.addEventListener("change", async (e) => {
  const file = e.target.files?.[0];
  if (!file) return;
  try {
    const { base64, mediaType, dataUrl } = await resizeAndEncodeImage(file);
    imageBase64 = base64;
    imageMediaType = mediaType;
    imgThumb.src = dataUrl;
    imgPreviewRow.classList.remove("hidden");
    setOutput("");
  } catch (err) {
    setError("Не удалось обработать изображение: " + err.message);
  }
  e.target.value = "";
});

imgRemoveBtn.addEventListener("click", () => {
  imageBase64 = null; imageMediaType = null;
  imgPreviewRow.classList.add("hidden");
  setOutput("");
});

photoBtn.addEventListener("click", () => fileInput.click());

imgTranslateBtn.addEventListener("click", async () => {
  if (!imageBase64) return;
  if (abortController) abortController.abort();
  abortController = new AbortController();
  const controller = abortController;

  setLoading(true);
  const srcLang = srcSelect.value, tgtLang = tgtSelect.value;
  const srcName = srcLang === "auto" ? "any language (auto-detect)" : getLangName(srcLang);
  const tgtName = getLangName(tgtLang);

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      signal: controller.signal,
      body: JSON.stringify({
        contents: [{
          parts: [
            { inline_data: { mime_type: imageMediaType, data: imageBase64 } },
            { text: "Extract and translate the text in this image." }
          ]
        }],
        systemInstruction: { parts: [{ text: `You are an OCR and translation engine. Extract all visible text from the image, then translate it from ${srcName} to ${tgtName}. Respond ONLY with valid JSON in this exact shape, no markdown fences, no commentary: {"recognized":"<exact extracted text>","translated":"<translated text>"}` }] },
        generationConfig: { maxOutputTokens: 1000 },
      }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message ?? `HTTP ${res.status}`);
    }
    const data = await res.json();
    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text ?? "";
    const clean = raw.replace(/```json|```/g, "").trim();
    let parsed;
    try { parsed = JSON.parse(clean); } catch { throw new Error("Не удалось разобрать ответ модели"); }
    if (!parsed.translated) throw new Error("На фото не найдено текста для перевода");

    setOutput(parsed.translated, parsed.recognized || "");
    addHistoryItem({
      input: parsed.recognized || "[фото без текста]",
      output: parsed.translated, src: srcLang, tgt: tgtLang,
      time: new Date().toLocaleTimeString("ru"),
    });
  } catch (e) {
    if (e.name === "AbortError") return;
    setError("Ошибка: " + e.message);
  } finally {
    if (abortController === controller) setLoading(false);
  }
});

/* ============== МИКРОФОН ============== */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SR) { micBtn.disabled = true; micBtn.title = "Микрофон не поддерживается в этом браузере"; }

micBtn.addEventListener("click", () => {
  if (!SR) { setError("Микрофон не поддерживается в этом браузере. Используйте Chrome или Edge."); return; }
  if (recording) { recognition?.stop(); return; }
  navigator.mediaDevices?.getUserMedia({ audio: true }).then(() => {
    recognition = new SR();
    recognition.lang = LANG_LOCALE[srcSelect.value] ?? "ru-RU";
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.onresult = (e) => {
      const txt = e.results[0][0].transcript;
      inputText.value = txt;
      charCount.textContent = txt.length;
      recording = false; updateMicUI();
      doTranslate(txt, srcSelect.value, tgtSelect.value);
    };
    recognition.onerror = (e) => {
      setError("Ошибка микрофона: " + (e.error === "not-allowed" ? "нет разрешения. Разрешите доступ к микрофону в браузере." : e.error));
      recording = false; updateMicUI();
    };
    recognition.onend = () => { recording = false; updateMicUI(); };
    recognition.start();
    recording = true; updateMicUI();
  }).catch(() => setError("Доступ к микрофону запрещён. Разрешите его в настройках браузера."));
});

function updateMicUI() {
  micBtn.classList.toggle("recording", recording);
  micBtn.textContent = recording ? "⏹" : "🎤";
  recordingLabel.classList.toggle("hidden", !recording);
}

/* ============== ОБЩИЕ ОБРАБОТЧИКИ ============== */
inputText.addEventListener("input", () => { charCount.textContent = inputText.value.length; clearInputBtn.classList.toggle("hidden", !inputText.value); });
inputText.addEventListener("keydown", (e) => { if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) doTranslate(inputText.value, srcSelect.value, tgtSelect.value); });
clearInputBtn.addEventListener("click", () => { inputText.value = ""; charCount.textContent = "0"; clearInputBtn.classList.add("hidden"); setOutput(""); });

$("translateBtn").addEventListener("click", () => doTranslate(inputText.value, srcSelect.value, tgtSelect.value));

$("swapBtn").addEventListener("click", () => {
  if (srcSelect.value === "auto") return;
  const prevSrc = srcSelect.value, prevTgt = tgtSelect.value;
  const prevIn = inputText.value, prevOut = outputText.textContent === "Перевод появится здесь…" ? "" : outputText.textContent;
  srcSelect.value = prevTgt; tgtSelect.value = prevSrc;
  inputText.value = prevOut; charCount.textContent = prevOut.length;
  setOutput(prevIn);
});

$("speakBtn").addEventListener("click", () => {
  const text = outputText.textContent;
  if (!text || text === "Перевод появится здесь…") return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = tgtSelect.value;
  window.speechSynthesis.speak(u);
});

$("copyBtn").addEventListener("click", () => {
  navigator.clipboard.writeText(outputText.textContent).then(() => {
    const btn = $("copyBtn");
    const old = btn.textContent;
    btn.textContent = "✓ Скопировано"; btn.classList.add("copied");
    setTimeout(() => { btn.textContent = old; btn.classList.remove("copied"); }, 2000);
  });
});

$("clearOutputBtn").addEventListener("click", () => setOutput(""));

window.addEventListener("beforeunload", () => abortController?.abort());

/* ============== СТАРТ ============== */
fillSelects();
loadHistory();
setOutput("");
</script>
</body>
</html>
